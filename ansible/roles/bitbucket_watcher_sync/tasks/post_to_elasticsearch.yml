---
# ---------- 2) Post config to API endpoint ----------
# Invoked once per parsed watcher_file (one Bitbucket YAML file may define
# several keyword watchers for the same service).
#
# Wrapped in block/rescue/always so the requester is told either way —
# a merged PR that fails to activate must not fail silently. Notified
# once per file (i.e. once per request), not once per keyword, since
# requestedBy/approvedBy live at the file level.

- block:
    - name: PUT each keyword watcher to the Elasticsearch Watcher API
      ansible.builtin.uri:
        url: "{{ es_watcher_api_base }}/_watcher/watch/{{ item.name }}"
        method: PUT
        headers:
          Authorization: "ApiKey {{ vault_es_api_key }}"
        body_format: json
        body: "{{ lookup('template', 'watcher_payload.json.j2') }}"
        status_code: [200, 201]
        timeout: "{{ es_request_timeout }}"
      loop: "{{ watcher_file.watchers }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        watcher: "{{ item }}"
        service: "{{ watcher_file.service }}"
        watcher_metadata: "{{ watcher_file.metadata }}"
      register: watcher_put_result
      retries: "{{ es_request_retries }}"
      delay: 5
      until: watcher_put_result is succeeded
      no_log: true

    - name: Report what was created
      ansible.builtin.debug:
        msg: "Watcher '{{ item.item.name }}' -> {{ item.json.created | default(false) and 'created' or 'updated' }}"
      loop: "{{ watcher_put_result.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Notify requester — activation succeeded
      ansible.builtin.include_role:
        name: notify_requester
      vars:
        notify_entity_ref: "{{ (watcher_file.metadata | default({})).requestedBy | default('unknown') }}"
        notify_severity: normal
        notify_title: "Alert activated: {{ watcher_file.service.container }}"
        notify_description: >-
          {{ watcher_file.watchers | length }} keyword watcher(s) for
          {{ watcher_file.service.container }} ({{ watcher_file.service.environment }})
          are live on ELK. Approved by {{ (watcher_file.metadata | default({})).approvedBy | default('unknown') }}.

  rescue:
    - name: Notify requester — activation FAILED
      ansible.builtin.include_role:
        name: notify_requester
      vars:
        notify_entity_ref: "{{ (watcher_file.metadata | default({})).requestedBy | default('unknown') }}"
        notify_severity: critical
        notify_title: "Alert activation FAILED: {{ watcher_file.service.container }}"
        notify_description: >-
          Your merged change for {{ watcher_file.service.container }}
          ({{ watcher_file.service.environment }}) could not be fully applied
          to ELK. The repo now disagrees with what's actually running —
          this needs SRE attention, not just a retry.

    - name: Re-raise so the CI job itself is still reported as failed
      ansible.builtin.fail:
        msg: "ELK activation failed for {{ watcher_file.service.container }} — see notification above for detail."
