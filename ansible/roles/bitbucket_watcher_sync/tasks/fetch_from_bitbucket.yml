---
# ---------- 1) Read config from Bitbucket ----------

- name: List watcher files under {{ watchers_dir }} (polling mode)
  ansible.builtin.uri:
    url: "{{ bitbucket_base_url }}/rest/api/1.0/projects/{{ bitbucket_project_key }}/repos/{{ bitbucket_repo_slug }}/browse/{{ watchers_dir }}?at=refs/heads/{{ bitbucket_branch }}"
    headers:
      Authorization: "Bearer {{ vault_bitbucket_token }}"
    return_content: true
    timeout: "{{ bitbucket_request_timeout }}"
  register: watcher_dir_listing
  when: changed_file_path is not defined
  no_log: true

- name: Build the list of watcher file paths to sync
  ansible.builtin.set_fact:
    watcher_file_paths: >-
      {{ [changed_file_path] if changed_file_path is defined
         else (watcher_dir_listing.json.children.values
               | selectattr('path.toString', 'match', '.*\.ya?ml$')
               | map(attribute='path.toString')
               | list) }}

- name: Fail fast if there is nothing to sync
  ansible.builtin.assert:
    that: watcher_file_paths | length > 0
    fail_msg: "No watcher files found under {{ watchers_dir }} on {{ bitbucket_branch }}."

- name: Fetch raw content for each watcher file
  ansible.builtin.uri:
    url: "{{ bitbucket_base_url }}/rest/api/1.0/projects/{{ bitbucket_project_key }}/repos/{{ bitbucket_repo_slug }}/raw/{{ item }}?at=refs/heads/{{ bitbucket_branch }}"
    headers:
      Authorization: "Bearer {{ vault_bitbucket_token }}"
    return_content: true
    timeout: "{{ bitbucket_request_timeout }}"
  loop: "{{ watcher_file_paths }}"
  register: watcher_file_responses
  no_log: true

- name: Parse each watcher file's YAML content
  ansible.builtin.set_fact:
    watcher_configs: >-
      {{ (watcher_configs | default([])) + [item.content | from_yaml] }}
  loop: "{{ watcher_file_responses.results }}"
  loop_control:
    label: "{{ item.item }}"
