---
- name: Validate required input
  ansible.builtin.assert:
    that:
      - bitbucket_project_key is defined
      - bitbucket_repo_slug is defined
      - es_watcher_api_base is defined
    fail_msg: "bitbucket_project_key, bitbucket_repo_slug, and es_watcher_api_base must be set (see group_vars/all/main.yml)."

- name: 1) Read watcher config from Bitbucket
  ansible.builtin.include_tasks: fetch_from_bitbucket.yml

- name: 2) Post each watcher config to the Elasticsearch API
  ansible.builtin.include_tasks: post_to_elasticsearch.yml
  loop: "{{ watcher_configs }}"
  loop_control:
    loop_var: watcher_file
    label: "{{ watcher_file.service.container | default(watcher_file.service.entity) }}"
