[defaults]
inventory = inventory/hosts.ini
roles_path = roles
retry_files_enabled = False
host_key_checking = False
# "yaml" reads nicer but ships in community.general, not bare ansible-core —
# don't depend on a collection nothing here declares as a requirement.
stdout_callback = default

