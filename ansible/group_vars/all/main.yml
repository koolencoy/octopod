---
# Non-secret config. Auto-loaded for the `all` group by Ansible's
# group_vars convention — no vars_files needed in the playbook.

# Bitbucket Server (Data Center) — matches the `publish:bitbucketServer`
# scaffolder action in ELK/backstage/scaffolder-template/template.yaml.
#
# Branching strategy: the Scaffolder commits each request to its own
# per-request branch (staging/<namespace>-<container>, or
# staging/<environment>-<robot> for DX UIM) off `main`, then opens a PR
# back into `main` — that PR is the approval gate (see
# sre:approval:request / sre:infinity:validate-change in template.yaml).
# `main` is production truth: it's what Ansible reads, both for a full
# poll and as the branch a webhook's fromHash/toHash refer to. Ansible
# never sees the staging/* branches — only the merge into main.
bitbucket_base_url: "https://bitbucket.ocbc.internal"
bitbucket_project_key: "SRE"
bitbucket_repo_slug: "elk-watchers"
bitbucket_branch: "main"
watchers_dir: "watchers"

# Set via --extra-vars when triggered by a Bitbucket post-receive webhook,
# e.g. `-e changed_file_path=watchers/deposit-adapter-sg_ms-cbs....yaml`.
# Left undefined for a scheduled/polling run, which syncs everything under
# watchers_dir instead — this is the "Elastic keeps reading any new
# configuration in Bitbucket" behaviour from the current-state pipeline.
# changed_file_path: ""

es_watcher_api_base: "https://elk-stack.ocbc.internal:9200"

# Watcher actions forward into Moogsoft for correlation, same as the
# platform-integrations slide describes.
moogsoft_webhook_host: "moogsoft.ocbc.internal"
moogsoft_webhook_port: 443
moogsoft_webhook_path: "/api/alerts/webhook"

# ---------- DX UIM (Open Systems) ----------
# Separate repo from elk-watchers — see ELK/bitbucket-architecture.html
# for why this is one repo per backend rather than a shared monorepo.
# Mirrors the local dxuim-config/ folder shape exactly:
#   {dxuim_config_root}/{environment}/{robot}/{probe}.json
bitbucket_dxuim_repo_slug: "dxuim-configs"
dxuim_config_root: "dxuim-config"

# UIM primary hub per environment. The folder structure only encodes
# {environment}/{robot} — it doesn't say which hub that robot reports
# into — so it's looked up here instead. Add a line whenever a new
# environment goes live; an environment folder with no entry here will
# fail the sync loudly rather than guess.
dxuim_hub_by_environment:
  UAT: "ulnstapor0a"

# See dxuim-config/guide.md for the sample command this is built from.
dxuim_api_base: "https://1.1.1.1:8443"
dxuim_auth_user: "accountsvcid"

# ---------- Requester notifications ----------
# Both sync roles report success/failure back through here (see the
# notify_requester role) so a merged PR that fails to activate doesn't
# fail silently — see mock/branching-strategy.html for where this sits
# in the overall flow.
backstage_notifications_api: "https://backstage.ocbc.internal/api"
