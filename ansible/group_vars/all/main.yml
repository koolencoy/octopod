---
# Non-secret config. Auto-loaded for the `all` group by Ansible's
# group_vars convention — no vars_files needed in the playbook.

# Bitbucket Server (Data Center) — matches the `publish:bitbucketServer`
# scaffolder action in ELK/backstage/scaffolder-template/template.yaml,
# which commits generated watcher configs to this same repo/branch.
bitbucket_base_url: "https://bitbucket.ocbc.internal"
bitbucket_project_key: "SRE"
bitbucket_repo_slug: "elk-watchers"
bitbucket_branch: "staging"
watchers_dir: "watchers"

# Set via --extra-vars when triggered by a Bitbucket post-receive webhook,
# e.g. `-e changed_file_path=watchers/deposit-adapter-sg_ms-cbs....yaml`.
# Left undefined for a scheduled/polling run, which syncs everything under
# watchers_dir instead — this is the "Elastic keeps reading any new
# configuration in Bitbucket" behaviour from the current-state pipeline.
# changed_file_path: ""

es_watcher_api_base: "https://elk-stack.ocbc.internal:9200"

# Watcher actions forward into Moogsoft for correlation, same as the
# platform-integrations slide describes.
moogsoft_webhook_host: "moogsoft.ocbc.internal"
moogsoft_webhook_port: 443
moogsoft_webhook_path: "/api/alerts/webhook"
